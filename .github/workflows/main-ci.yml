name: Main CI

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  shared-ci:
    uses: ./.github/workflows/shared-ci.yml
    with:
      fetch-depth: 0
      run-audit-signatures: true
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: [shared-ci]
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm clean-install

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install semantic-release
