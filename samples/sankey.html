<!doctype html>
<html lang="en">

<head>
	<title>Sankey diagram</title>
	<script src="utils.js"></script>
	<link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>
	<div class="canvas-holder">
		<canvas id="chart-area"></canvas>
	</div>

	<script>
		const colors = [
			'#1F77B4',
			'#FF7F0E',
			'#2CA02C',
			'#D62728',
			'#9467BD',
			'#8C564B',
			'#E377C2',
			'#7F7F7F',
			'#BCBD22'
		];

		const category = {
			"Agricultural 'waste'": 'Agricultural',
			Agriculture: 'Agriculture',
			'Bio-conversion': 'Bio-conversion',
			'Biofuel imports': 'Biofuel',
			'Biomass imports': 'Biomass',
			Coal: 'Coal',
			'Coal imports': 'Coal',
			'Coal reserves': 'Coal',
			'District heating': 'District',
			'Domestic aviation': 'Domestic',
			'Electricity grid': 'Electricity',
			Gas: 'Gas',
			'Gas imports': 'Gas',
			'Gas reserves': 'Gas',
			Geothermal: 'Geothermal',
			H2: 'H2',
			'H2 conversion': 'H2',
			'Heating and cooling - commercial': 'Heating',
			'Heating and cooling - homes': 'Heating',
			Hydro: 'Hydro',
			Industry: 'Industry',
			'International aviation': 'International',
			'International shipping': 'International',
			'Lighting & appliances - commercial': 'Lighting',
			'Lighting & appliances - homes': 'Lighting',
			Liquid: 'Liquid',
			Losses: 'Losses',
			'Marine algae': 'Marine',
			'National navigation': 'National',
			Ngas: 'Ngas',
			Nuclear: 'Nuclear',
			Oil: 'Oil',
			'Oil imports': 'Oil',
			'Oil reserves': 'Oil',
			'Other waste': 'Other',
			'Over generation / exports': 'Over',
			'Pumped heat': 'Pumped',
			'Rail transport': 'Rail',
			'Road transport': 'Road',
			Solar: 'Solar',
			'Solar PV': 'Solar',
			'Solar Thermal': 'Solar',
			Solid: 'Solid',
			'Thermal generation': 'Thermal',
			Tidal: 'Tidal',
			'UK land based bioenergy': 'UK',
			Wave: 'Wave',
			Wind: 'Wind',
		};

		const catColors = {};
		let colorIndex = 0;

		const getColor = (item) => {
			const cat = category[item];
			if (!catColors[cat]) {
				catColors[cat] = colors[colorIndex % 9];
				colorIndex++;
			}
			return catColors[cat];
		};

		const data = [
			{flow: 10.639, from: 'District heating', to: 'Industry' },
			{flow: 22.505, from: 'District heating', to: 'Heating and cooling - commercial' },
			{flow: 46.184, from: 'District heating', to: 'Heating and cooling - homes' },
			{flow: 104.453, from: 'Electricity grid', to: 'Over generation / exports' },
			{flow: 113.726, from: 'Electricity grid', to: 'Heating and cooling - homes' },
			{flow: 27.14, from: 'Electricity grid', to: 'H2 conversion' },
			{flow: 342.165, from: 'Electricity grid', to: 'Industry' },
			{flow: 37.797, from: 'Electricity grid', to: 'Road transport' },
			{flow: 4.412, from: 'Electricity grid', to: 'Agriculture' },
			{flow: 40.858, from: 'Electricity grid', to: 'Heating and cooling - commercial' },
			{flow: 56.691, from: 'Electricity grid', to: 'Losses' },
			{flow: 7.863, from: 'Electricity grid', to: 'Rail transport' },
			{flow: 90.008, from: 'Electricity grid', to: 'Lighting & appliances - commercial' },
			{flow: 93.494, from: 'Electricity grid', to: 'Lighting & appliances - homes' },
			{flow: 193.026, from: 'Pumped heat', to: 'Heating and cooling - homes' },
			{flow: 70.672, from: 'Pumped heat', to: 'Heating and cooling - commercial' },
			{flow: 19.263, from: 'Solar Thermal', to: 'Heating and cooling - homes' },
			{flow: 19.263, from: 'Solar', to: 'Solar Thermal' },
			{flow: 59.901, from: 'Solar', to: 'Solar PV' },
		];

		Utils.load(() => {
			Chart.defaults.font.size = 9;
			const ctx = document.getElementById('chart-area').getContext('2d');
			window.chart = new Chart(ctx, {
				data: {
					datasets: [{
						colorFrom: (c) => getColor(c.dataset.data[c.dataIndex].from),
						colorTo: (c) => getColor(c.dataset.data[c.dataIndex].to),
						data,
						label: 'My sankey'
					}]
				},
				options: {
					maintainAspectRatio: false,
					responsive: true,
					scales: {
						x: {
							max: 8,
							min: 0,
							offset: true,
							type: 'linear'
						},
						y: {
							max: 5200,
							min: 0,
							offset: true,
							reverse: true,
							type: 'linear'
						}
					},
					tooltips: {
						callbacks: {
							label(context) {
								const item = context.dataset.data[context.dataIndex];
								return [item.from + ' -> ' + item.to, item.flow];
							},
							title() {
								return '';
								// return data[tooltipItem.index].from;
							}
						}
					}
				},
				type: 'sankey'
			});

		});
	</script>
</body>

</html>
